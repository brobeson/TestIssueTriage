name: Auto Add to Project
on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      - name: Add to project
        uses: actions/add-to-project@v2
        with:
          project-url: https://github.com/users/brobeson/projects/17
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}
